      padding: 16px;

      gap: 12px;
      flex-direction: column;

      border-radius: 12px;
      padding: 16px;
      min-height: 340px;
      overflow-x: auto;
      position: sticky;
      top: 10px;

        do {
          if (row === rows && col === 0) {
            corner1(pos++);
          }

          if (row === rows - 2 && col === 0 && cols % 4 !== 0) {
            corner2(pos++);
          }

          if (row === rows - 2 && col === 0 && cols % 8 === 4) {
            corner3(pos++);
          }

          if (row === rows + 4 && col === 2 && cols % 8 === 0) {
            corner4(pos++);
          }

          do {
            if (row < rows && col >= 0 && !hasBit(row, col)) {
              utah(row, col, pos++);
            }

            row -= 2;
            col += 2;
          } while (row >= 0 && col < cols);

          row += 1;
          col += 3;

          do {
            if (row >= 0 && col < cols && !hasBit(row, col)) {
              utah(row, col, pos++);
            }

            row += 2;
            col -= 2;
          } while (row < rows && col >= 0);

          row += 3;
          col += 1;
        } while (row < rows || col < cols);

        if (!hasBit(rows - 1, cols - 1)) {
          setBit(rows - 1, cols - 1, true);
          setBit(rows - 2, cols - 2, true);
        }

        var matrix = [];

        for (var matrixRow = 0; matrixRow < rows; matrixRow++) {
          matrix[matrixRow] = [];

          for (var matrixCol = 0; matrixCol < cols; matrixCol++) {
            matrix[matrixRow][matrixCol] = bits[(matrixRow * cols) + matrixCol] === true;
          }
        }

        return matrix;
      }

      function addDataMatrixFinderPattern(dataMatrix, symbol) {
        var regionRows = symbol.regionRows;
        var regionCols = symbol.regionCols;
        var regionsY = symbol.rows / (regionRows + 2);
        var regionsX = symbol.cols / (regionCols + 2);
        var full = [];

        for (var row = 0; row < symbol.rows; row++) {
          full[row] = new Array(symbol.cols).fill(false);
        }

        for (var regionY = 0; regionY < regionsY; regionY++) {
          for (var regionX = 0; regionX < regionsX; regionX++) {
            var startRow = regionY * (regionRows + 2);
            var startCol = regionX * (regionCols + 2);

            for (var borderCol = 0; borderCol < regionCols + 2; borderCol++) {
              full[startRow][startCol + borderCol] = borderCol % 2 === 0;
              full[startRow + regionRows + 1][startCol + borderCol] = true;
            }

            for (var borderRow = 0; borderRow < regionRows + 2; borderRow++) {
              full[startRow + borderRow][startCol] = true;
              full[startRow + borderRow][startCol + regionCols + 1] = borderRow % 2 === 0;
            }
          }
        }

        for (var dataRow = 0; dataRow < dataMatrix.length; dataRow++) {
          var targetRegionY = Math.floor(dataRow / regionRows);
          var rowInRegion = dataRow % regionRows;
          var targetRow = targetRegionY * (regionRows + 2) + rowInRegion + 1;

          for (var dataCol = 0; dataCol < dataMatrix[dataRow].length; dataCol++) {
            var targetRegionX = Math.floor(dataCol / regionCols);
            var colInRegion = dataCol % regionCols;
            var targetCol = targetRegionX * (regionCols + 2) + colInRegion + 1;

            full[targetRow][targetCol] = dataMatrix[dataRow][dataCol];
          }
        }

        return full;
      }

      function createDataMatrix(value) {
        var normalized = normalizeDataMatrixInput(value);

        if (!normalized.text) {
          return null;
        }

        var dataCodewords = encodeDataMatrixAscii(normalized.text, normalized.isGs1);
        var symbol = findDataMatrixSymbol(dataCodewords.length);

        if (!symbol) {
          return {
            error: "too-long"
          };
        }

        var paddedCodewords = padDataMatrixCodewords(dataCodewords, symbol.data);
        var eccCodewords = createDataMatrixEcc(paddedCodewords, symbol);
        var allCodewords = paddedCodewords.concat(eccCodewords);
        var dataRows = symbol.rows - (2 * (symbol.rows / (symbol.regionRows + 2)));
        var dataCols = symbol.cols - (2 * (symbol.cols / (symbol.regionCols + 2)));
        var placed = placeDataMatrixCodewords(allCodewords, dataRows, dataCols);

        return {
          matrix: addDataMatrixFinderPattern(placed, symbol),
          rows: symbol.rows,
          cols: symbol.cols
        };
      }

      function makeDataMatrixSvg(matrix) {
        var rects = "";

        matrix.forEach(function (row, rowIndex) {
          var colIndex = 0;

          while (colIndex < row.length) {
            if (!row[colIndex]) {
              colIndex++;
              continue;
            }

            var startCol = colIndex;

            while (colIndex < row.length && row[colIndex]) {
              colIndex++;
            }

            rects += '<rect x="' + startCol + '" y="' + rowIndex + '" width="' +
              (colIndex - startCol) + '" height="1"/>';
          }
        });

        return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + matrix[0].length + ' ' + matrix.length +
          '" aria-label="Data Matrix Честный ЗНАК" preserveAspectRatio="none">' +
          '<rect width="100%" height="100%" fill="#fff"/>' +
          '<g fill="#000">' + rects + '</g>' +
          '</svg>';
      }

      function makeHonestSignHtml(value) {
        var dataMatrix = createDataMatrix(value);

        if (!dataMatrix) {
          return "";
        }

        if (dataMatrix.error) {
          return '<div class="honest-sign honest-sign--error">Data Matrix<br>too long</div>';
        }

        return '<div class="honest-sign">' + makeDataMatrixSvg(dataMatrix.matrix) + '</div>';
      }

      function getFormData() {
        return {
          productName: els.productName.value.trim(),
          packDate: formatDate(els.packDate.value),
          weight: els.weight.value.trim(),
          weightUnit: els.weightUnit.value,
          barcodeType: els.barcodeType.value,
          barcodeValue: normalizeBarcodeByType(els.barcodeValue.value.trim(), els.barcodeType.value),
          itemNumber: els.itemNumber.value.trim(),
          sellerArticle: els.sellerArticle.value.trim(),
          ozonSkuId: els.ozonSkuId.value.trim(),
          wbNmId: els.wbNmId.value.trim(),
          wbBrand: els.wbBrand.value.trim(),
          wbCountry: els.wbCountry.value.trim(),
          wbSupplier: els.wbSupplier.value.trim(),
          quantity: els.quantity.value.trim(),
          expiryDate: formatDate(els.expiryDate.value),
          productColor: els.productColor.value.trim(),
          productSize: els.productSize.value.trim(),
          storageConditions: els.storageConditions.value.trim(),
          yandexDescription: els.yandexDescription.value.trim(),
          yandexComposition: els.yandexComposition.value.trim(),
          yandexShelfLife: els.yandexShelfLife.value.trim(),
          yandexSerialNumber: els.yandexSerialNumber.value.trim(),
          fbsMarketplace: els.fbsMarketplace.value.trim(),
          fbsOrderNumber: els.fbsOrderNumber.value.trim(),
          fbsShipmentNumber: els.fbsShipmentNumber.value.trim(),
          fbsWarehouseComment: els.fbsWarehouseComment.value.trim(),
          markingCode: els.markingCode.value.trim(),
          preset: currentLabelPreset
        };
      }

      function makeMetaItem(className, labelKey, value) {
        if (!value) return "";
        return '<div class="label__meta-item ' + className + '">' +
          escapeHtml(t(labelKey)) + ' <span class="bold">' + escapeHtml(value) + '</span>' +
        '</div>';
      }

      function buildLabelHtml(data) {
        var visibleBarcode = String(data.barcodeValue || "").replace(/\s+/g, "");
        var honestSignHtml = makeHonestSignHtml(data.markingCode);
        var serialBarcodeHtml = data.preset === "yandex" ? makeSerialBarcodeHtml(data.yandexSerialNumber) : "";
        var fbsOrderBarcodeHtml = data.preset === "fbs" ? makeFbsOrderBarcodeHtml(data.fbsOrderNumber, data.fbsShipmentNumber) : "";
        var marketplaceHtml = "";
        var metaHtml = "";

        if (data.preset === "ozon") {
          marketplaceHtml = '<div class="label__marketplace">OZON</div>';
        } else if (data.preset === "wildberries") {
          marketplaceHtml = '<div class="label__marketplace">WB</div>';
        } else if (data.preset === "yandex") {
          marketplaceHtml = '<div class="label__marketplace">' + escapeHtml(t("yandexPresetButton")) + '</div>';
        } else if (data.preset === "fbs") {
          marketplaceHtml = '<div class="label__marketplace">' +
            escapeHtml(data.fbsMarketplace || t("fbsPresetButton")) +
          '</div>';
        }

        if (data.preset === "ozon") {
          metaHtml = '<div class="label__meta">' +
            makeMetaItem("label__date", "labelDate", data.packDate) +
            makeMetaItem("label__weight", "labelWeight", data.weight ? data.weight + " " + weightUnitText(data.weightUnit) : "") +
            makeMetaItem("", "labelSellerArticle", data.sellerArticle) +
            makeMetaItem("", "labelOzonSkuId", data.ozonSkuId) +
            makeMetaItem("", "labelQuantity", data.quantity) +
            makeMetaItem("", "labelExpiryDate", data.expiryDate) +
            makeMetaItem("", "labelProductColor", data.productColor) +
            makeMetaItem("", "labelProductSize", data.productSize) +
            makeMetaItem("label__storage", "labelStorageConditions", data.storageConditions) +
          '</div>';
        } else if (data.preset === "wildberries") {
          metaHtml = '<div class="label__meta">' +
            makeMetaItem("", "labelSellerArticle", data.sellerArticle) +
            makeMetaItem("", "labelWbNmId", data.wbNmId) +
            makeMetaItem("", "labelWbBrand", data.wbBrand) +
            makeMetaItem("", "labelWbCountry", data.wbCountry) +
            makeMetaItem("label__supplier", "labelWbSupplier", data.wbSupplier) +
            makeMetaItem("", "labelProductColor", data.productColor) +
            makeMetaItem("", "labelProductSize", data.productSize) +
            makeMetaItem("", "labelExpiryDate", data.expiryDate) +
            makeMetaItem("", "labelQuantity", data.quantity) +
          '</div>';
        } else if (data.preset === "yandex") {
          metaHtml = '<div class="label__meta">' +
            makeMetaItem("label__description", "labelYandexDescription", data.yandexDescription) +
            makeMetaItem("label__composition", "labelYandexComposition", data.yandexComposition) +
            makeMetaItem("", "labelYandexExpiryDate", data.expiryDate) +
            makeMetaItem("", "labelYandexShelfLife", data.yandexShelfLife) +
            makeMetaItem("", "labelYandexSellerArticle", data.sellerArticle) +
            makeMetaItem("", "labelYandexQuantity", data.quantity) +
            makeMetaItem("", "labelYandexColor", data.productColor) +
            makeMetaItem("", "labelYandexSize", data.productSize) +
          '</div>';
        } else if (data.preset === "fbs") {
          metaHtml = '<div class="label__meta">' +
            makeMetaItem("", "labelFbsMarketplace", data.fbsMarketplace) +
            makeMetaItem("", "labelFbsShipment", data.fbsShipmentNumber) +
            makeMetaItem("", "labelFbsSellerArticle", data.sellerArticle) +
            makeMetaItem("", "labelFbsQuantity", data.quantity) +
            makeMetaItem("", "labelFbsColor", data.productColor) +
            makeMetaItem("", "labelFbsSize", data.productSize) +
            makeMetaItem("label__comment", "labelFbsComment", data.fbsWarehouseComment) +
          '</div>';
        } else {
          metaHtml = '<div class="label__date">' +
              escapeHtml(t("labelDate")) + ' <span class="bold">' + escapeHtml(data.packDate) + '</span>' +
            '</div>' +

            '<div class="label__weight">' +
              escapeHtml(t("labelWeight")) + ', ' + escapeHtml(weightUnitText(data.weightUnit)) + ': <span class="bold">' + escapeHtml(data.weight) + '</span>' +
            '</div>';
        }

        return '' +
            '<div class="label label--' + escapeHtml(data.preset || "default") + '">' +
            marketplaceHtml +
            '<div class="label__name">' + escapeHtml(data.productName) + '</div>' +
            metaHtml +
            fbsOrderBarcodeHtml +
            serialBarcodeHtml +
            honestSignHtml +
            '<div class="barcode-box">' +
              makeBarcodeSvg(data.barcodeValue, data.barcodeType) +
              '<div class="barcode-text">' + escapeHtml(visibleBarcode) + '</div>' +
            '</div>' +

            '<div class="label__big-number">' + escapeHtml(data.itemNumber) + '</div>' +
          '</div>';
      }

      function renderPreview() {
        updateLabelSize();
        els.labelMount.innerHTML = buildLabelHtml(getFormData());
      }

      function setLanguage(language) {
        currentLanguage = language === "ru" ? "ru" : "en";

        document.documentElement.lang = t("htmlLang");
        document.title = t("pageTitle");

        document.querySelectorAll("[data-i18n]").forEach(function (node) {
          var key = node.getAttribute("data-i18n");
          node.textContent = t(key);
        });

        els.langEn.classList.toggle("is-active", currentLanguage === "en");
        els.langRu.classList.toggle("is-active", currentLanguage === "ru");

        renderPreview();
      }

      function setPresetMode(preset) {
        currentLabelPreset = LABEL_PRESETS[preset] ? preset : "default";

        if (els.regularPreset) {
          els.regularPreset.classList.toggle("is-active", currentLabelPreset === "default");
        }

        if (els.ozonPreset) {
          els.ozonPreset.classList.toggle("is-active", currentLabelPreset === "ozon");
        }

        if (els.wildberriesPreset) {
          els.wildberriesPreset.classList.toggle("is-active", currentLabelPreset === "wildberries");
        }

        if (els.yandexPreset) {
          els.yandexPreset.classList.toggle("is-active", currentLabelPreset === "yandex");
        }

        if (els.fbsPreset) {
          els.fbsPreset.classList.toggle("is-active", currentLabelPreset === "fbs");
        }

        els.marketplaceFields.forEach(function (node) {
          node.classList.toggle("is-hidden", currentLabelPreset === "default");
        });

        els.regularOzonFields.forEach(function (node) {
          node.classList.toggle("is-hidden",
            currentLabelPreset === "wildberries" ||
            currentLabelPreset === "yandex" ||
            currentLabelPreset === "fbs"
          );
        });

        els.ozonFields.forEach(function (node) {
          var isSharedField = node.classList.contains("marketplace-field");
          node.classList.toggle("is-hidden", isSharedField ? currentLabelPreset === "default" : currentLabelPreset !== "ozon");
        });

        els.wbFields.forEach(function (node) {
          var isSharedField = node.classList.contains("marketplace-field");
          node.classList.toggle("is-hidden", isSharedField ? currentLabelPreset === "default" : currentLabelPreset !== "wildberries");
        });

        els.yandexFields.forEach(function (node) {
          var isSharedField = node.classList.contains("marketplace-field");
          node.classList.toggle("is-hidden", isSharedField ? currentLabelPreset === "default" : currentLabelPreset !== "yandex");
        });

        els.fbsFields.forEach(function (node) {
          var isSharedField = node.classList.contains("marketplace-field");
          node.classList.toggle("is-hidden", isSharedField ? currentLabelPreset === "default" : currentLabelPreset !== "fbs");
        });
      }

      function applyRegularPreset() {
        applyPresetSettings("default");
        renderPreview();
      }

      function getSharedStyles() {
        var styles = "";
        document.querySelectorAll("style").forEach(function (styleTag) {
          styles += styleTag.textContent + "\n";
        });
        return styles;
      }

      function resetForm() {
        applyPresetSettings("default");
        setFieldValues(RESET_VALUES, false);
        renderPreview();
      }

      function applyOzonPreset() {
        applyPresetSettings("ozon");
        els.weightUnit.value = "kg";
        setFieldValues(PRESET_DEFAULTS.ozon, true);
        renderPreview();
      }

      function applyWildberriesPreset() {
        applyPresetSettings("wildberries");
        els.weightUnit.value = "kg";
        setFieldValues(PRESET_DEFAULTS.wildberries, true);
        renderPreview();
      }

      function applyYandexPreset() {
        applyPresetSettings("yandex");
        els.weightUnit.value = "kg";
        setFieldValues(PRESET_DEFAULTS.yandex, true);
        renderPreview();
      }

      function applyFbsPreset() {
        applyPresetSettings("fbs");
        els.weightUnit.value = "kg";
        setFieldValues(PRESET_DEFAULTS.fbs, true);
        renderPreview();
      }

      function openPrintPreview() {
        renderPreview();

        var data = getFormData();
        var labelHtml = buildLabelHtml(data);
        var styles = getSharedStyles();
        var fileTitle = t("pdfPrefix") + "_" + safeFilePart(data.itemNumber) + "_" + safeFilePart(data.productName);
        var labelWidthCss = formatPx(currentLabelWidth);
        var labelHeightCss = formatPx(currentLabelHeight);
        var printStyles = [
          ":root {",
          "  --label-width: " + labelWidthCss + ";",
          "  --label-height: " + labelHeightCss + ";",
          "}",
          "",
          "body {",
          "  margin: 0;",
          "  background: #f4f4f4;",
          "  font-family: Arial, Helvetica, sans-serif;",
          "  color: #111;",
          "}",
          "",
          ".print-page {",
          "  min-height: 100vh;",
          "  display: flex;",
          "  flex-direction: column;",
          "  align-items: center;",
          "  padding: 24px;",
          "}",
          "",
          ".toolbar {",
          "  display: flex;",
          "  gap: 10px;",
          "  flex-wrap: wrap;",
          "  margin-bottom: 18px;",
          "}",
          "",
          ".toolbar button {",
          "  width: auto;",
          "  min-width: 160px;",
          "  margin: 0;",
          "}",
          "",
          ".toolbar .light {",
          "  background: #e7e7e7;",
          "  color: #111;",
          "}",
          "",
          ".label-frame {",
          "  width: var(--label-width);",
          "  height: var(--label-height);",
          "  background: #fff;",
          "}",
          "",
          ".help {",
          "  margin-top: 12px;",
          "  font-size: 13px;",
          "  color: #555;",
          "  text-align: center;",
          "  line-height: 1.35;",
          "}",
          "",
          "@media print {",
          "  @page {",
          "    size: " + labelWidthCss + " " + labelHeightCss + ";",
          "    margin: 0;",
          "  }",
          "",
          "  html,",
          "  body {",
          "    width: " + labelWidthCss + ";",
          "    height: " + labelHeightCss + ";",
          "    background: #fff;",
          "  }",
          "",
          "  .print-page {",
          "    min-height: auto;",
          "    display: block;",
          "    padding: 0;",
          "  }",
          "",
          "  .toolbar,",
          "  .help {",
          "    display: none !important;",
          "  }",
          "",
          "  .label-frame,",
          "  .label {",
          "    width: var(--label-width) !important;",
          "    height: var(--label-height) !important;",
          "  }",
          "",
          "  .label-frame {",
          "    border: 0 !important;",
          "    box-shadow: none !important;",
          "  }",
          "}"
        ].join("\n");

        var previewHtml = '<!doctype html>' +
          '<html lang="' + t("htmlLang") + '">' +
          '<head>' +
            '<meta charset="utf-8">' +
            '<title>' + escapeHtml(fileTitle) + '</title>' +
            '<style>' + styles + '</style>' +
            '<style>' + printStyles + '</style>' +
          '</head>' +
          '<body>' +
            '<div class="print-page">' +
              '<div class="toolbar">' +
                '<button type="button" onclick="window.print()">' + escapeHtml(t("printButton")) + '</button>' +
                '<button class="light" type="button" onclick="window.close()">' + escapeHtml(t("closeButton")) + '</button>' +
              '</div>' +
              '<div class="label-frame">' + labelHtml + '</div>' +
              '<div class="help">' + escapeHtml(t("helpText")) + '</div>' +
            '</div>' +
          '</body>' +
          '</html>';

        var previewWindow = window.open("", "_blank");

        if (!previewWindow) {
          alert(t("popupBlocked"));
          return;
        }

        previewWindow.document.open();
        previewWindow.document.write(previewHtml);
        previewWindow.document.close();
      }

      Object.keys(els).forEach(function (key) {
        if (key !== "labelUnit" && els[key] &&
            (els[key].tagName === "INPUT" || els[key].tagName === "SELECT" || els[key].tagName === "TEXTAREA")) {
          els[key].addEventListener("input", renderPreview);
          els[key].addEventListener("change", renderPreview);
        }
      });

      els.langEn.addEventListener("click", function () {
        setLanguage("en");
      });

      els.langRu.addEventListener("click", function () {
        setLanguage("ru");
      });

      els.labelUnit.addEventListener("change", changeLabelUnit);

      els.openPreview.addEventListener("click", openPrintPreview);
      els.regularPreset.addEventListener("click", applyRegularPreset);
      els.ozonPreset.addEventListener("click", applyOzonPreset);
      els.wildberriesPreset.addEventListener("click", applyWildberriesPreset);
      els.yandexPreset.addEventListener("click", applyYandexPreset);
      els.fbsPreset.addEventListener("click", applyFbsPreset);
      els.resetForm.addEventListener("click", resetForm);

      applyPresetSettings("default");
      setFieldValues({
        packDate: todayISO,
        quantity: "1",
        weightUnit: "kg"
      }, false);

      setLanguage("en");
    })();
  </script>
</body>
</html>
